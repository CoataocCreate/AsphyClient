<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Circle</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    .circle {
      width: 50vw;        /* scales with screen width */
      height: 50vw;       /* keeps it perfectly round */
      max-width: 300px;   /* prevents it from getting too big */
      max-height: 300px;
      background: #4CAF50;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="circle"></div>

</body>
</html>
