<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunaOS Terminal+</title>

<style>
:root {
    --bg:#0d0d0d;
    --text:#e6e6e6;
    --dim:#9aa0a6;
    --path:#58a6ff;
    --cmd:#7ee787;
    --err:#ff6b6b;
    --dir:#1f6feb;
}

body,html{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono";
}

#terminal{
    height:100%;
    padding:18px;
    overflow-y:auto;
    box-sizing:border-box;
}

.line{white-space:pre-wrap; margin:2px 0; line-height:1.4}
.dim{color:var(--dim)}
.err{color:var(--err)}
.dir{color:var(--dir); font-weight:600}
.path{color:var(--path)}
.cmd{color:var(--cmd)}

.prompt{
    display:flex;
    gap:10px;
    align-items:center;
}

input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font:inherit;
}

</style>
</head>

<body>
<div id="terminal">
    <div id="log"></div>

    <div class="prompt">
        <span class="path" id="p">~</span> $
        <input id="i" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<script>
let fs = JSON.parse(localStorage.getItem("fs") || "null") || {
"/":{
  home:{user:{
    "readme.txt":"Welcome to LunaOS Terminal+",
  }},
  etc:{},
  bin:{}
}}
;

let cwd="/home/user";
let hist=[], hi=-1;

const log=document.getElementById("log");
const input=document.getElementById("i");
const prompt=document.getElementById("p");

const print=(t,c="")=>{
  const d=document.createElement("div");
  d.className="line "+c;
  d.innerHTML=t;
  log.appendChild(d);
  document.getElementById("terminal").scrollTop=1e9;
};

const save=()=>localStorage.setItem("fs",JSON.stringify(fs));

function get(path){
  if(path==="/")return fs["/"];
  let n=fs["/"];
  for(const p of path.split("/").filter(Boolean)){
    if(!n[p])return null;
    n=n[p];
  }
  return n;
}

function resolve(base,t){
  if(!t) return base;
  if(t==="~") return "/home/user";
  let p=(t[0]=="/"?t:base+"/"+t).split("/");
  let s=[];
  for(const x of p){
    if(!x||x===".")continue;
    if(x==="..")s.pop();
    else s.push(x);
  }
  return "/"+s.join("/");
}

function list(dir){
  return Object.entries(dir).map(([k,v])=>{
    return typeof v==="object"
      ? `<span class="dir">${k}/</span>`
      : k;
  }).join("  ");
}

input.addEventListener("keydown",async e=>{
  if(e.key==="Enter"){
    const raw=input.value.trim();
    const shown=cwd.replace("/home/user","~");

    print(`<span class="path">${shown}</span> $ ${raw}`);

    if(raw){
      hist.push(raw); hi=hist.length;
      await exec(raw);
    }

    input.value="";
    prompt.textContent=cwd.replace("/home/user","~");
  }

  if(e.key==="ArrowUp"){
    if(hi>0) input.value=hist[--hi];
  }

  if(e.key==="ArrowDown"){
    if(hi<hist.length-1) input.value=hist[++hi];
    else input.value="";
  }

  if(e.key==="Tab"){
    e.preventDefault();
    const cmds=["ls","cd","cat","mkdir","touch","rm","echo","clear","help","pwd","history"];
    const val=input.value.trim();
    const match=cmds.find(c=>c.startsWith(val));
    if(match) input.value=match;
  }
});

async function exec(raw){
  const [cmd,...a]=raw.split(" ");
  const p=a.join(" ");

  switch(cmd){

  case "help":
    print("ls cd cat mkdir touch rm echo clear pwd history");
    break;

  case "pwd":
    print(cwd);
    break;

  case "ls":{
    const d=get(cwd);
    print(list(d||{}));
    break;
  }

  case "cd":{
    const t=resolve(cwd,p);
    const n=get(t);
    if(n&&typeof n==="object")cwd=t;
    else print("no such dir","err");
    break;
  }

  case "cat":{
    const f=get(resolve(cwd,p));
    if(typeof f==="string") print(f.replace(/\n/g,"<br>"));
    else print("not a file","err");
    break;
  }

  case "mkdir":{
    const d=get(cwd);
    d[p]={};
    save();
    break;
  }

  case "touch":{
    const d=get(cwd);
    d[p]="";
    save();
    break;
  }

  case "rm":{
    const d=get(cwd);
    delete d[p];
    save();
    break;
  }

  case "echo":
    print(p);
    break;

  case "history":
    print(hist.join("<br>"));
    break;

  case "clear":
    log.innerHTML="";
    break;

  default:
    if(cmd) print("command not found","err");
  }
}
</script>
</body>
</html>
