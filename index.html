<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fake Linux OS</title>
<link rel="manifest" href="manifest.json">
<style>
    body {
        margin: 0;
        font-family: monospace;
        background: #0f172a;
        overflow: hidden;
    }

    #desktop {
        width: 100vw;
        height: 100vh;
        background: linear-gradient(120deg, #0f172a, #1e293b);
        position: relative;
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
    }

    /* Icons like mobile grid */
    .icon {
        width: 80px;
        color: white;
        text-align: center;
        margin: 15px;
        cursor: pointer;
        user-select: none;
    }

    #taskbar {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 40px;
        background: #111827;
        display: flex;
        align-items: center;
        padding: 0 10px;
        color: white;
    }

    /* Window now responsive */
    .window {
        position: absolute;
        width: min(600px, 95vw);
        height: min(400px, 70vh);
        background: #0b1220;
        border: 1px solid #334155;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .titlebar {
        background: #1f2937;
        padding: 8px;
        cursor: grab;
        display: flex;
        justify-content: space-between;
        color: white;
        user-select: none;
    }

    .content {
        padding: 10px;
        color: #22c55e;
        height: calc(100% - 35px);
        overflow-y: auto;
        font-size: 14px;
    }

    input {
        width: 100%;
        background: transparent;
        border: none;
        color: #22c55e;
        outline: none;
        font-family: monospace;
        font-size: 14px;
    }

    /* Mobile fullscreen behavior */
    @media (max-width: 600px) {
        .window {
            width: 100vw;
            height: calc(100vh - 40px);
            top: 0 !important;
            left: 0 !important;
            border-radius: 0;
        }

        #taskbar {
            height: 40px;
        }
    }
</style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openTerminal()">
        🖥️<br>Terminal
    </div>

    <div id="taskbar">Fake Linux OS</div>
</div>

<script>
let fs = {
    "/": {
        "home": {
            "user": {
                "hello.txt": "Hello from Fake Linux OS!",
                "notes.txt": "This is a virtual filesystem."
            }
        },
        "etc": {
            "config.txt": "kernel=false"
        }
    }
};

let cwd = "/";

function getPathObj(path) {
    let parts = path.split("/").filter(Boolean);
    let node = fs["/"];
    for (let p of parts) {
        if (node[p]) node = node[p];
        else return null;
    }
    return node;
}

function openTerminal() {
    let win = document.createElement("div");
    win.className = "window";
    win.style.top = "100px";
    win.style.left = "100px";

    win.innerHTML = `
        <div class="titlebar">
            <span>terminal</span>
            <span onclick="this.closest('.window').remove()" style="cursor:pointer;">✖</span>
        </div>
        <div class="content" id="term"></div>
    `;

    document.getElementById("desktop").appendChild(win);

    let term = win.querySelector("#term");

    function print(text) {
        term.innerHTML += text + "<br>";
        term.scrollTop = term.scrollHeight;
    }

    function prompt() {
        term.innerHTML += `<span>${cwd} $ </span>
        <input id="cmd" autofocus />`;

        let input = term.querySelector("#cmd");
        input.focus();

        input.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                let val = input.value.trim();
                term.removeChild(input);

                handleCommand(val, print);
                prompt();
            }
        });
    }

    function handleCommand(cmd, print) {
        let parts = cmd.split(" ");
        let c = parts[0];

        if (c === "help") {
            print("Commands: ls, cat, cd, clear, help");
        }

        else if (c === "ls") {
            let node = getPathObj(cwd);
            print(Object.keys(node).join("  "));
        }

        else if (c === "cd") {
            let target = parts[1];
            if (!target) return;
            if (target === "..") {
                cwd = "/";
            } else {
                cwd = cwd.endsWith("/") ? cwd + target : cwd + "/" + target;
            }
        }

        else if (c === "cat") {
            let file = parts[1];
            let node = getPathObj(cwd);
            if (node[file]) print(node[file]);
            else print("No such file");
        }

        else if (c === "clear") {
            term.innerHTML = "";
        }

        else {
            print("command not found");
        }
    }

    print("Fake Linux Terminal v1");
    prompt();

    makeDraggable(win);
}

/* Drag support */
function makeDraggable(win) {
    let bar = win.querySelector(".titlebar");
    let offsetX, offsetY, dragging = false;

    bar.addEventListener("mousedown", e => {
        dragging = true;
        offsetX = e.clientX - win.offsetLeft;
        offsetY = e.clientY - win.offsetTop;
    });

    document.addEventListener("mousemove", e => {
        if (dragging) {
            win.style.left = (e.clientX - offsetX) + "px";
            win.style.top = (e.clientY - offsetY) + "px";
        }
    });

    document.addEventListener("mouseup", () => dragging = false);
}
</script>

</body>
</html>
